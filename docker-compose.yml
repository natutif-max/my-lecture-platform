version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend/lectures:/app/lectures
    container_name: lectures-backend

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    container_name: lectures-frontend