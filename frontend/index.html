<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Мои лекции</title>
    <style>
        body { font-family: Arial; background: #1e1e2e; color: #eee; display: flex; margin: 0; }
        .sidebar { width: 300px; background: #181825; padding: 20px; height: 100vh; overflow-y: auto; }
        .content { flex: 1; padding: 20px; }
        iframe { width: 100%; height: 85vh; border: none; background: white; border-radius: 12px; }
        button, input[type="file"] { margin: 10px 0; padding: 8px; border-radius: 8px; }
        .lecture-list { list-style: none; padding-left: 0; }
        .lecture-list li { margin: 8px 0; cursor: pointer; color: #89b4fa; }
    </style>
</head>
<body>
<div class="sidebar">
    <h3>📚 Лекции</h3>
    <input type="file" id="uploadFile" accept=".html">
    <button id="uploadBtn">⬆️  Добавить лекцию</button>
    <ul id="lectureList" class="lecture-list"></ul>
</div>
<div class="content">
    <div id="viewer">📖  Выберите лекцию слева</div>
</div>

<script>
    const API_URL = 'http://localhost:3001/api';

    async function loadLectures() {
        const res = await fetch(`${API_URL}/lectures`);
        const files = await res.json();
        const list = document.getElementById('lectureList');
        list.innerHTML = '';
        files.forEach(file => {
            const li = document.createElement('li');
            li.textContent = file.replace('.html', '');
            li.onclick = () => openLecture(file);
            list.appendChild(li);
        });
    }

    async function openLecture(filename) {
        const viewer = document.getElementById('viewer');
        viewer.innerHTML = `<iframe src="${API_URL}/lecture/${filename}"></iframe>`;
    }

    document.getElementById('uploadBtn').onclick = async () => {
        const fileInput = document.getElementById('uploadFile');
        if (!fileInput.files.length) return alert('Выберите файл .html');
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);
        await fetch(`${API_URL}/upload`, { method: 'POST', body: formData });
        loadLectures();
    };

    loadLectures();
</script>
</body>
</html>
